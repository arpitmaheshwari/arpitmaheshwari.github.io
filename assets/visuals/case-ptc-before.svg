<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="t d">
  <title id="t">PTC University — before consolidation: five disconnected learning platforms</title>
  <desc id="d">A muted editorial line-art banner on cream paper. Five separate, unconnected platform tiles are scattered left to right — Learning Connector, LearningExchange, Precision LMS, Digital Guides and IoTU — each sitting on its own with its own small sign-in lock icon. There are no flow lines between them, conveying duplication, fragmentation and friction before everything was consolidated into one platform.</desc>

  <!-- palette: cream F4ECDA / panel EEE4CE / ink 2C2620 / soft 6A6052 / faint 998D78 / ember C0512B / ochre CE9230 / pine 2F5D52 / hairline rgba(44,38,32,0.12) -->
  <defs>
    <style>
      .hd{font-family:Georgia,'Times New Roman',serif;fill:#2C2620;}
      .lb{font-family:ui-sans-serif,system-ui,sans-serif;fill:#6A6052;}
      .em{font-family:ui-sans-serif,system-ui,sans-serif;fill:#C0512B;}
    </style>
  </defs>

  <!-- paper fills the whole canvas -->
  <rect x="0" y="0" width="1280" height="400" fill="#F4ECDA"/>
  <rect x="18" y="18" width="1244" height="364" fill="none" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>

  <!-- ===================== HEADER ROW (full width) ===================== -->
  <text x="48" y="62" class="lb" font-size="14" letter-spacing="3" opacity="0.8">EDTECH &#183; PTC UNIVERSITY</text>
  <text x="48" y="100" class="hd" font-size="34">Before &#8212; five disconnected platforms</text>
  <text x="1232" y="96" text-anchor="end" class="lb" font-size="14" letter-spacing="2" opacity="0.75">DUPLICATION &#183; FRICTION</text>
  <line x1="48" y1="120" x2="1232" y2="120" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>

  <!-- =====================================================================
       FIVE SCATTERED, DISCONNECTED TILES laid out edge-to-edge.
       Each tile: panel + own header bar + own lock (sign-in) icon + 3 grey content rows.
       Deliberately staggered vertically + no connecting lines = fragmented mess.
       Tile geometry: w=216, h=176, rx=10
       ===================================================================== -->

  <!-- tile group template realized 5x, muted strokes -->

  <!-- TILE 1: Learning Connector (x=48, y top) -->
  <g transform="translate(48,156)">
    <rect x="0" y="0" width="216" height="176" rx="10" fill="#EEE4CE" stroke="#998D78" stroke-width="1.6"/>
    <line x1="0" y1="40" x2="216" y2="40" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
    <!-- own sign-in lock -->
    <g transform="translate(22,20)" stroke="#C0512B" stroke-width="1.8" fill="none" opacity="0.85">
      <rect x="-9" y="-1" width="18" height="13" rx="2.5" fill="#F4ECDA"/>
      <path d="M -5.5 -1 V -5 a 5.5 5.5 0 0 1 11 0 V -1"/>
    </g>
    <circle cx="44" cy="20" r="1.7" fill="#C0512B"/>
    <text x="56" y="26" class="lb" font-size="14" fill="#2C2620">Learning Connector</text>
    <!-- own grey content rows -->
    <rect x="22" y="64" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="64" width="128" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <rect x="22" y="90" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="90" width="92" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <rect x="22" y="116" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="116" width="150" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <text x="22" y="156" class="lb" font-size="12" letter-spacing="1.5" opacity="0.85">SEPARATE LOGIN</text>
  </g>

  <!-- TILE 2: LearningExchange (x=296, y lower) -->
  <g transform="translate(296,196)">
    <rect x="0" y="0" width="216" height="176" rx="10" fill="#EEE4CE" stroke="#998D78" stroke-width="1.6"/>
    <line x1="0" y1="40" x2="216" y2="40" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
    <g transform="translate(22,20)" stroke="#CE9230" stroke-width="1.8" fill="none" opacity="0.85">
      <rect x="-9" y="-1" width="18" height="13" rx="2.5" fill="#F4ECDA"/>
      <path d="M -5.5 -1 V -5 a 5.5 5.5 0 0 1 11 0 V -1"/>
    </g>
    <circle cx="44" cy="20" r="1.7" fill="#CE9230"/>
    <text x="56" y="26" class="lb" font-size="14" fill="#2C2620">LearningExchange</text>
    <rect x="22" y="64" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="64" width="104" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <rect x="22" y="90" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="90" width="140" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <rect x="22" y="116" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="116" width="80" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <text x="22" y="156" class="lb" font-size="12" letter-spacing="1.5" opacity="0.85">SEPARATE LOGIN</text>
  </g>

  <!-- TILE 3: Precision LMS (centre, x=544, y top) -->
  <g transform="translate(544,150)">
    <rect x="0" y="0" width="216" height="176" rx="10" fill="#EEE4CE" stroke="#998D78" stroke-width="1.6"/>
    <line x1="0" y1="40" x2="216" y2="40" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
    <g transform="translate(22,20)" stroke="#2F5D52" stroke-width="1.8" fill="none" opacity="0.85">
      <rect x="-9" y="-1" width="18" height="13" rx="2.5" fill="#F4ECDA"/>
      <path d="M -5.5 -1 V -5 a 5.5 5.5 0 0 1 11 0 V -1"/>
    </g>
    <circle cx="44" cy="20" r="1.7" fill="#2F5D52"/>
    <text x="56" y="26" class="lb" font-size="14" fill="#2C2620">Precision LMS</text>
    <rect x="22" y="64" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="64" width="146" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <rect x="22" y="90" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="90" width="88" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <rect x="22" y="116" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="116" width="120" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <text x="22" y="156" class="lb" font-size="12" letter-spacing="1.5" opacity="0.85">SEPARATE LOGIN</text>
  </g>

  <!-- TILE 4: Digital Guides (x=792, y lower) -->
  <g transform="translate(792,200)">
    <rect x="0" y="0" width="216" height="176" rx="10" fill="#EEE4CE" stroke="#998D78" stroke-width="1.6"/>
    <line x1="0" y1="40" x2="216" y2="40" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
    <g transform="translate(22,20)" stroke="#CE9230" stroke-width="1.8" fill="none" opacity="0.85">
      <rect x="-9" y="-1" width="18" height="13" rx="2.5" fill="#F4ECDA"/>
      <path d="M -5.5 -1 V -5 a 5.5 5.5 0 0 1 11 0 V -1"/>
    </g>
    <circle cx="44" cy="20" r="1.7" fill="#CE9230"/>
    <text x="56" y="26" class="lb" font-size="14" fill="#2C2620">Digital Guides</text>
    <rect x="22" y="64" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="64" width="96" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <rect x="22" y="90" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="90" width="156" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <rect x="22" y="116" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="116" width="110" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <text x="22" y="156" class="lb" font-size="12" letter-spacing="1.5" opacity="0.85">SEPARATE LOGIN</text>
  </g>

  <!-- TILE 5: IoTU (x=1040, y top) -->
  <g transform="translate(1016,154)">
    <rect x="0" y="0" width="216" height="176" rx="10" fill="#EEE4CE" stroke="#998D78" stroke-width="1.6"/>
    <line x1="0" y1="40" x2="216" y2="40" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
    <g transform="translate(22,20)" stroke="#C0512B" stroke-width="1.8" fill="none" opacity="0.85">
      <rect x="-9" y="-1" width="18" height="13" rx="2.5" fill="#F4ECDA"/>
      <path d="M -5.5 -1 V -5 a 5.5 5.5 0 0 1 11 0 V -1"/>
    </g>
    <circle cx="44" cy="20" r="1.7" fill="#C0512B"/>
    <text x="56" y="26" class="lb" font-size="14" fill="#2C2620">IoTU</text>
    <rect x="22" y="64" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="64" width="118" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <rect x="22" y="90" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="90" width="82" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <rect x="22" y="116" width="172" height="9" rx="4.5" fill="#998D78" opacity="0.35"/>
    <rect x="22" y="116" width="138" height="9" rx="4.5" fill="#998D78" opacity="0.7"/>
    <text x="22" y="156" class="lb" font-size="12" letter-spacing="1.5" opacity="0.85">SEPARATE LOGIN</text>
  </g>

  <!-- broken / severed connectors between tiles: tiny gaps with crossbars = no link -->
  <g stroke="#998D78" stroke-width="1.4" opacity="0.55" stroke-dasharray="2 7" stroke-linecap="round">
    <line x1="270" y1="250" x2="290" y2="250"/>
    <line x1="518" y1="250" x2="538" y2="250"/>
    <line x1="766" y1="250" x2="786" y2="250"/>
    <line x1="1014" y1="250" x2="1034" y2="250"/>
  </g>
</svg>
