<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="t d">
  <title id="t">PTC University — five learning platforms consolidated into one Learning Connector</title>
  <desc id="d">A wide editorial line-art banner on cream paper. On the left, five small labelled tiles — Learning Connector, LearningExchange, Precision LMS, Digital Guides and IoTU — connect through thin flow lines that gather rightward into a single unified Learning Connector platform shell, captioned "one sign-in, one catalogue, one home". A small globe note reads "9 to 11 languages".</desc>

  <defs>
    <style>
      .hd{font-family:Georgia,'Times New Roman',serif}
      .lb{font-family:ui-sans-serif,system-ui,sans-serif}
    </style>
  </defs>

  <!-- palette: bg cream #F4ECDA / panel #EEE4CE / ink #2C2620 / soft #6A6052 / faint #998D78 / ember #C0512B / ochre #CE9230 / pine #2F5D52 / hairline rgba(44,38,32,0.12) -->

  <!-- paper -->
  <rect x="0" y="0" width="1280" height="400" fill="#F4ECDA"/>
  <rect x="18" y="18" width="1244" height="364" fill="none" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>

  <!-- ===== TITLE BLOCK (top-left) ===== -->
  <text x="52" y="60" class="lb" font-size="13" letter-spacing="3" fill="#998D78">EDTECH · PTC UNIVERSITY · PLATFORM CONSOLIDATION</text>
  <text x="52" y="100" class="hd" font-size="30" fill="#2C2620">Five platforms <tspan fill="#C0512B">&#8594;</tspan> one Learning Connector</text>
  <line x1="52" y1="122" x2="618" y2="122" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
  <text x="52" y="146" class="lb" font-size="13" letter-spacing="2" fill="#998D78">MANY (BEFORE)</text>

  <!-- ===== FIVE SOURCE TILES (left column) ===== -->
  <g class="lb" font-size="15">
    <!-- tile 1 -->
    <g transform="translate(52,166)">
      <rect x="0" y="0" width="232" height="40" rx="8" fill="#F4ECDA" stroke="#C0512B" stroke-width="1.5"/>
      <circle cx="22" cy="20" r="4" fill="#C0512B"/>
      <text x="40" y="25" fill="#2C2620">Learning Connector</text>
    </g>
    <!-- tile 2 -->
    <g transform="translate(52,212)">
      <rect x="0" y="0" width="232" height="40" rx="8" fill="#F4ECDA" stroke="#CE9230" stroke-width="1.5"/>
      <circle cx="22" cy="20" r="4" fill="#CE9230"/>
      <text x="40" y="25" fill="#2C2620">LearningExchange</text>
    </g>
    <!-- tile 3 -->
    <g transform="translate(52,258)">
      <rect x="0" y="0" width="232" height="40" rx="8" fill="#F4ECDA" stroke="#2F5D52" stroke-width="1.5"/>
      <circle cx="22" cy="20" r="4" fill="#2F5D52"/>
      <text x="40" y="25" fill="#2C2620">Precision LMS</text>
    </g>
    <!-- tile 4 -->
    <g transform="translate(52,304)">
      <rect x="0" y="0" width="232" height="40" rx="8" fill="#F4ECDA" stroke="#C0512B" stroke-width="1.5"/>
      <circle cx="22" cy="20" r="4" fill="#C0512B"/>
      <text x="40" y="25" fill="#2C2620">Digital Guides</text>
    </g>
    <!-- tile 5 -->
    <g transform="translate(52,350)">
      <rect x="0" y="0" width="232" height="40" rx="8" fill="#F4ECDA" stroke="#CE9230" stroke-width="1.5"/>
      <circle cx="22" cy="20" r="4" fill="#CE9230"/>
      <text x="40" y="25" fill="#2C2620">IoTU</text>
    </g>
  </g>

  <!-- ===== FLOW LINES gathering from tiles -> hub node (x=560 y=270) ===== -->
  <!-- tiles right edge x=284; vertical mids: 186,232,278,324,370 -->
  <g fill="none" stroke="#998D78" stroke-width="1.4" stroke-linecap="round">
    <path d="M284 186 C 400 186, 470 270, 552 270"/>
    <path d="M284 232 C 410 232, 480 270, 552 270"/>
    <path d="M284 278 H 552"/>
    <path d="M284 324 C 410 324, 480 270, 552 270"/>
    <path d="M284 370 C 400 370, 470 270, 552 270"/>
  </g>
  <!-- source dots on tile edges -->
  <g fill="#F4ECDA" stroke="#998D78" stroke-width="1.3">
    <circle cx="284" cy="186" r="3"/>
    <circle cx="284" cy="232" r="3"/>
    <circle cx="284" cy="278" r="3"/>
    <circle cx="284" cy="324" r="3"/>
    <circle cx="284" cy="370" r="3"/>
  </g>
  <!-- gather / hub node -->
  <circle cx="560" cy="270" r="9" fill="#F4ECDA" stroke="#C0512B" stroke-width="2"/>
  <circle cx="560" cy="270" r="3" fill="#C0512B"/>

  <!-- single unified flow into the shell -->
  <path d="M569 270 H 656" stroke="#C0512B" stroke-width="2" fill="none"/>
  <polygon points="652,264 668,270 652,276" fill="#C0512B"/>

  <!-- ===== UNIFIED PLATFORM SHELL (right) ===== -->
  <!-- shell: x=684 y=120 width=544 height=224 -->
  <text x="684" y="146" class="lb" font-size="13" letter-spacing="2" fill="#998D78">ONE (AFTER)</text>
  <g transform="translate(684,156)">
    <rect x="0" y="0" width="544" height="190" rx="16" fill="#EEE4CE" stroke="#C0512B" stroke-width="2"/>

    <!-- top chrome bar -->
    <line x1="0" y1="46" x2="544" y2="46" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
    <circle cx="26" cy="23" r="6" fill="none" stroke="#C0512B" stroke-width="1.5"/>
    <text x="44" y="29" class="hd" font-size="18" fill="#2C2620">Learning Connector</text>
    <!-- signed-in chip -->
    <rect x="414" y="10" width="116" height="26" rx="13" fill="#F4ECDA" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
    <circle cx="436" cy="23" r="6" fill="none" stroke="#2F5D52" stroke-width="1.5"/>
    <path d="M433 23 l2.5 2.5 l4 -5" fill="none" stroke="#2F5D52" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="452" y="27" class="lb" font-size="11" letter-spacing="1" fill="#6A6052">ONE SIGN-IN</text>

    <!-- left rail (one home) -->
    <line x1="146" y1="46" x2="146" y2="190" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
    <g class="lb" font-size="13">
      <rect x="20" y="64" width="104" height="22" rx="6" fill="#F4ECDA" stroke="#C0512B" stroke-width="1.2"/>
      <text x="34" y="79" fill="#C0512B">Home</text>
      <text x="34" y="111" fill="#6A6052">Catalogue</text>
      <text x="34" y="139" fill="#6A6052">My learning</text>
      <text x="34" y="167" fill="#998D78">Certifications</text>
    </g>

    <!-- main panel: one catalogue (course cards) -->
    <text x="170" y="74" class="hd" font-size="15" fill="#2C2620">One catalogue</text>
    <g>
      <!-- card a -->
      <rect x="170" y="88" width="110" height="86" rx="10" fill="#F4ECDA" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
      <rect x="184" y="102" width="18" height="18" rx="5" fill="none" stroke="#C0512B" stroke-width="1.5"/>
      <line x1="184" y1="138" x2="266" y2="138" stroke="#6A6052" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="184" y1="154" x2="240" y2="154" stroke="#998D78" stroke-width="2.4" stroke-linecap="round"/>
      <!-- card b -->
      <rect x="292" y="88" width="110" height="86" rx="10" fill="#F4ECDA" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
      <rect x="306" y="102" width="18" height="18" rx="5" fill="none" stroke="#CE9230" stroke-width="1.5"/>
      <line x1="306" y1="138" x2="388" y2="138" stroke="#6A6052" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="306" y1="154" x2="362" y2="154" stroke="#998D78" stroke-width="2.4" stroke-linecap="round"/>
      <!-- card c -->
      <rect x="414" y="88" width="110" height="86" rx="10" fill="#F4ECDA" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
      <rect x="428" y="102" width="18" height="18" rx="5" fill="none" stroke="#2F5D52" stroke-width="1.5"/>
      <line x1="428" y1="138" x2="510" y2="138" stroke="#6A6052" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="428" y1="154" x2="484" y2="154" stroke="#998D78" stroke-width="2.4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- caption under the shell -->
  <text x="956" y="372" text-anchor="middle" class="lb" font-size="14" letter-spacing="1.5" fill="#6A6052">one sign-in &#183; one catalogue &#183; one home</text>

  <!-- ===== globe / locale note (top-right) ===== -->
  <g transform="translate(1196,66)">
    <circle cx="0" cy="0" r="22" fill="#F4ECDA" stroke="#2F5D52" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="9" ry="22" fill="none" stroke="#2F5D52" stroke-width="1.1"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#2F5D52" stroke-width="1.1"/>
    <path d="M-18.5 -11 H 18.5" stroke="#2F5D52" stroke-width="0.9"/>
    <path d="M-18.5 11 H 18.5" stroke="#2F5D52" stroke-width="0.9"/>
    <circle cx="-8" cy="-7" r="2.4" fill="#C0512B"/>
    <circle cx="6" cy="9" r="2.4" fill="#CE9230"/>
  </g>
  <text x="1196" y="112" text-anchor="middle" class="lb" font-size="13" letter-spacing="0.5" fill="#6A6052">9 &#8594; 11 languages</text>
</svg>
