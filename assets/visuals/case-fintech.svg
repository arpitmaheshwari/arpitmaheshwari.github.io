<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="t d">
  <title id="t">FinTech deal risk: explain before the verdict</title>
  <desc id="d">A wide left-to-right diagram on cream paper. Three source documents on the left — Financials, Market data and Diligence notes — each traced by a thin line into a central circular deal-risk score reading 62. From the score a line leads to a panel on the right titled "Explain this score", listing three weighted factors with bars: revenue concentration, market volatility and management tenure.</desc>

  <!-- palette: bg #F4ECDA / panel #EEE4CE / ink #2C2620 / soft #6A6052 / faint #998D78 / ember #C0512B / ochre #CE9230 / pine #2F5D52 / hairline rgba(44,38,32,0.12) -->

  <rect x="0" y="0" width="1280" height="400" fill="#F4ECDA"/>

  <!-- top hairline + title row -->
  <line x1="36" y1="62" x2="1244" y2="62" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
  <text x="36" y="44" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#2C2620">Explain before the verdict</text>
  <text x="1244" y="44" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" letter-spacing="3" fill="#998D78">FINTECH · DEAL RISK</text>

  <!-- ================= LEFT: three source documents ================= -->
  <g stroke="#6A6052" stroke-width="1.5" fill="none" stroke-linejoin="round">
    <!-- doc 1: Financials -->
    <g transform="translate(48,108)">
      <path d="M0 0 H78 L100 22 V96 H0 Z" fill="#EEE4CE"/>
      <path d="M78 0 V22 H100"/>
      <line x1="14" y1="44" x2="84" y2="44" stroke="#998D78"/>
      <line x1="14" y1="60" x2="84" y2="60" stroke="#998D78"/>
      <line x1="14" y1="76" x2="62" y2="76" stroke="#998D78"/>
    </g>
    <!-- doc 2: Market data -->
    <g transform="translate(48,228)">
      <path d="M0 0 H78 L100 22 V96 H0 Z" fill="#EEE4CE"/>
      <path d="M78 0 V22 H100"/>
      <polyline points="16,80 32,62 48,70 64,50 80,58 92,46" stroke="#998D78"/>
    </g>
  </g>

  <!-- doc 3: Diligence notes (placed in lower-left, completing the trio) -->
  <g stroke="#6A6052" stroke-width="1.5" fill="none" stroke-linejoin="round">
    <g transform="translate(208,168)">
      <path d="M0 0 H78 L100 22 V96 H0 Z" fill="#EEE4CE"/>
      <path d="M78 0 V22 H100"/>
      <line x1="14" y1="44" x2="84" y2="44" stroke="#998D78"/>
      <line x1="14" y1="60" x2="84" y2="60" stroke="#998D78"/>
      <line x1="14" y1="76" x2="68" y2="76" stroke="#998D78"/>
    </g>
  </g>

  <!-- source labels -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#998D78">
    <text x="48" y="100">Financials</text>
    <text x="48" y="220">Market data</text>
    <text x="208" y="160">Diligence notes</text>
  </g>

  <!-- ================= traced connector lines doc -> score ================= -->
  <!-- score ring left edge ~ (522,200) -->
  <g fill="none" stroke="#C0512B" stroke-width="1.6" stroke-linecap="round">
    <path d="M148 156 C 320 156, 380 196, 519 196"/>
    <path d="M148 276 C 320 276, 380 204, 519 204"/>
    <path d="M308 216 C 400 230, 440 210, 519 202"/>
  </g>
  <g fill="#C0512B">
    <circle cx="519" cy="196" r="3.5"/>
    <circle cx="519" cy="204" r="3.5"/>
    <circle cx="519" cy="202" r="3.5"/>
  </g>
  <g fill="#F4ECDA" stroke="#C0512B" stroke-width="1.6">
    <circle cx="148" cy="156" r="3.5"/>
    <circle cx="148" cy="276" r="3.5"/>
    <circle cx="308" cy="216" r="3.5"/>
  </g>

  <!-- ================= CENTER: circular deal-RISK score ================= -->
  <g transform="translate(636,200)">
    <text x="0" y="-112" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" letter-spacing="3" fill="#998D78">DEAL</text>
    <!-- faint track -->
    <circle r="92" fill="#EEE4CE" stroke="rgba(44,38,32,0.12)" stroke-width="12"/>
    <!-- score arc ~62% sweep, ember, from top clockwise -->
    <circle r="92" fill="none" stroke="#C0512B" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="358 220" transform="rotate(-90)"/>
    <text x="0" y="14" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#2C2620">62</text>
    <text x="0" y="46" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" letter-spacing="2" fill="#6A6052">RISK SCORE</text>
  </g>

  <!-- link from score to explain panel -->
  <line x1="728" y1="200" x2="852" y2="200" stroke="#998D78" stroke-width="1.6"/>
  <circle cx="728" cy="200" r="3.5" fill="#998D78"/>

  <!-- ================= RIGHT: Explain this score panel ================= -->
  <g transform="translate(852,96)">
    <rect x="0" y="0" width="392" height="208" rx="10" fill="#EEE4CE" stroke="rgba(44,38,32,0.12)" stroke-width="1.5"/>
    <text x="26" y="40" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#2C2620">Explain this score</text>
    <line x1="26" y1="54" x2="366" y2="54" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>

    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="16">
      <!-- factor 1 -->
      <circle cx="34" cy="86" r="4" fill="#C0512B"/>
      <text x="50" y="91" fill="#2C2620">Revenue concentration</text>
      <text x="366" y="91" text-anchor="end" fill="#6A6052">+34%</text>
      <rect x="26" y="102" width="340" height="8" rx="4" fill="#F4ECDA"/>
      <rect x="26" y="102" width="238" height="8" rx="4" fill="#C0512B"/>

      <!-- factor 2 -->
      <circle cx="34" cy="140" r="4" fill="#CE9230"/>
      <text x="50" y="145" fill="#2C2620">Market volatility</text>
      <text x="366" y="145" text-anchor="end" fill="#6A6052">+19%</text>
      <rect x="26" y="156" width="340" height="8" rx="4" fill="#F4ECDA"/>
      <rect x="26" y="156" width="150" height="8" rx="4" fill="#CE9230"/>

      <!-- factor 3 -->
      <circle cx="34" cy="194" r="4" fill="#2F5D52"/>
      <text x="50" y="199" fill="#2C2620">Management tenure</text>
      <text x="366" y="199" text-anchor="end" fill="#6A6052">-9%</text>
      <rect x="26" y="210" width="340" height="8" rx="4" fill="#F4ECDA"/>
      <rect x="26" y="210" width="78" height="8" rx="4" fill="#2F5D52"/>
    </g>
  </g>

  <!-- bottom hairline + process labels -->
  <line x1="36" y1="344" x2="1244" y2="344" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
  <text x="36" y="372" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#998D78">Sources traced</text>
  <text x="636" y="372" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#998D78">Verdict scored</text>
  <text x="1244" y="372" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#998D78">Reasons shown</text>
</svg>
