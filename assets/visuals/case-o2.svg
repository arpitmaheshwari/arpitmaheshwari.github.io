<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="t d">
  <title id="t">MyO2 self-service and Priority Moments loyalty, designed and built on mobile web</title>
  <desc id="d">A wide editorial line-art banner on cream paper. Two abstract rounded phone outlines sit side by side. The left phone represents MyO2 self-service, with a data-usage meter, a bill line and a tariff toggle. The right phone represents Priority Moments loyalty, with three abstract reward and offer cards. A thin hairline connects the two phones, conveying one mobile-web experience that joins self-service and loyalty. A quiet caption reads "4M+ users · 2.6M sign-ups · mobile web".</desc>

  <defs>
    <style>
      .hd{font-family:Georgia,'Times New Roman',serif}
      .lb{font-family:ui-sans-serif,system-ui,sans-serif}
    </style>
  </defs>

  <!-- palette: bg cream #F4ECDA / panel #EEE4CE / ink #2C2620 / soft #6A6052 / faint #998D78 / ember #C0512B / ochre #CE9230 / pine #2F5D52 / hairline rgba(44,38,32,0.12) -->

  <!-- paper -->
  <rect x="0" y="0" width="1280" height="400" fill="#F4ECDA"/>
  <rect x="20" y="20" width="1240" height="360" rx="10" fill="none" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>

  <!-- ============ centre label band ============ -->
  <g text-anchor="middle">
    <text x="640" y="74" class="lb" font-size="14" letter-spacing="3" fill="#998D78">O2 UK CONSUMER · MOBILE WEB</text>
    <text x="640" y="118" class="hd" font-size="34" fill="#2C2620">Self-service, meet loyalty</text>
    <text x="640" y="146" class="lb" font-size="16" fill="#6A6052">Two products, one mobile-web experience.</text>
  </g>

  <!-- product labels above each phone -->
  <g class="lb" font-size="13" letter-spacing="2" fill="#998D78">
    <text x="230" y="118" text-anchor="middle">MYO2 · SELF-SERVICE</text>
    <text x="1050" y="118" text-anchor="middle">PRIORITY MOMENTS · LOYALTY</text>
  </g>

  <!-- ============ CONNECTING HAIRLINE (drawn first so it tucks under phones) ============ -->
  <!-- left phone right edge ~ x=440, right phone left edge ~ x=840, centred vertically ~y=250 -->
  <line x1="440" y1="250" x2="840" y2="250" stroke="rgba(44,38,32,0.12)" stroke-width="1.5" stroke-dasharray="2 7" stroke-linecap="round"/>
  <circle cx="440" cy="250" r="3.5" fill="#F4ECDA" stroke="#C0512B" stroke-width="1.5"/>
  <circle cx="840" cy="250" r="3.5" fill="#F4ECDA" stroke="#C0512B" stroke-width="1.5"/>
  <text x="640" y="236" text-anchor="middle" class="lb" font-size="11" letter-spacing="2" fill="#998D78">ONE JOURNEY</text>

  <!-- ============ LEFT PHONE — MyO2 self-service ============ -->
  <!-- phone body 280 wide x 230 tall, top-left at (160,140) -->
  <g transform="translate(160,140)">
    <rect x="0" y="0" width="280" height="230" rx="28" fill="#EEE4CE" stroke="#2C2620" stroke-width="1.8"/>
    <!-- speaker notch -->
    <line x1="120" y1="18" x2="160" y2="18" stroke="#998D78" stroke-width="3" stroke-linecap="round"/>

    <!-- data / usage meter (semicircular gauge) -->
    <g transform="translate(78,108)">
      <path d="M -50 0 A 50 50 0 0 1 50 0" fill="none" stroke="rgba(44,38,32,0.12)" stroke-width="9" stroke-linecap="round"/>
      <!-- ~68% sweep of the half-arc, ember -->
      <path d="M -50 0 A 50 50 0 0 1 40 -30" fill="none" stroke="#C0512B" stroke-width="9" stroke-linecap="round"/>
      <text x="0" y="-2" text-anchor="middle" class="hd" font-size="24" fill="#2C2620">6.4</text>
      <text x="0" y="16" text-anchor="middle" class="lb" font-size="10" letter-spacing="1.5" fill="#6A6052">GB OF 12</text>
    </g>

    <!-- bill line -->
    <rect x="148" y="58" width="106" height="50" rx="9" fill="#F4ECDA" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
    <text x="161" y="78" class="lb" font-size="11" fill="#6A6052">Monthly bill</text>
    <text x="161" y="98" class="hd" font-size="18" fill="#2C2620">£28</text>

    <!-- tariff toggle -->
    <text x="28" y="180" class="lb" font-size="13" fill="#6A6052">Auto top-up</text>
    <g transform="translate(196,168)">
      <rect x="0" y="0" width="52" height="26" rx="13" fill="#2F5D52"/>
      <circle cx="39" cy="13" r="9" fill="#F4ECDA"/>
    </g>

    <!-- manage plan row (quiet) -->
    <line x1="28" y1="200" x2="252" y2="200" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
    <text x="28" y="219" class="lb" font-size="13" fill="#998D78">Manage plan</text>
    <path d="M240 211 l7 6 l-7 6" fill="none" stroke="#998D78" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ============ RIGHT PHONE — Priority Moments loyalty ============ -->
  <g transform="translate(840,140)">
    <rect x="0" y="0" width="280" height="230" rx="28" fill="#EEE4CE" stroke="#2C2620" stroke-width="1.8"/>
    <!-- speaker notch -->
    <line x1="120" y1="18" x2="160" y2="18" stroke="#998D78" stroke-width="3" stroke-linecap="round"/>

    <!-- header -->
    <text x="28" y="56" class="hd" font-size="17" fill="#2C2620">Rewards</text>
    <text x="252" y="56" text-anchor="end" class="lb" font-size="11" letter-spacing="1" fill="#998D78">NEARBY</text>
    <line x1="28" y1="68" x2="252" y2="68" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>

    <!-- reward / offer card 1 (ember accent) -->
    <g transform="translate(28,80)">
      <rect x="0" y="0" width="224" height="40" rx="10" fill="#F4ECDA" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
      <rect x="12" y="9" width="22" height="22" rx="6" fill="none" stroke="#C0512B" stroke-width="1.6"/>
      <path d="M18 20 l4 4 l7 -9" fill="none" stroke="#C0512B" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="48" y1="16" x2="170" y2="16" stroke="#6A6052" stroke-width="2" stroke-linecap="round"/>
      <line x1="48" y1="28" x2="130" y2="28" stroke="#998D78" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- reward / offer card 2 (ochre accent) -->
    <g transform="translate(28,128)">
      <rect x="0" y="0" width="224" height="40" rx="10" fill="#F4ECDA" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
      <rect x="12" y="9" width="22" height="22" rx="6" fill="none" stroke="#CE9230" stroke-width="1.6"/>
      <path d="M23 11 v18 M16 16 l7 -5 l7 5" fill="none" stroke="#CE9230" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="48" y1="16" x2="170" y2="16" stroke="#6A6052" stroke-width="2" stroke-linecap="round"/>
      <line x1="48" y1="28" x2="118" y2="28" stroke="#998D78" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- reward / offer card 3 (pine accent) -->
    <g transform="translate(28,176)">
      <rect x="0" y="0" width="224" height="40" rx="10" fill="#F4ECDA" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
      <rect x="12" y="9" width="22" height="22" rx="6" fill="none" stroke="#2F5D52" stroke-width="1.6"/>
      <circle cx="23" cy="20" r="6.5" fill="none" stroke="#2F5D52" stroke-width="1.6"/>
      <line x1="48" y1="16" x2="170" y2="16" stroke="#6A6052" stroke-width="2" stroke-linecap="round"/>
      <line x1="48" y1="28" x2="142" y2="28" stroke="#998D78" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- caption -->
  <line x1="500" y1="350" x2="780" y2="350" stroke="rgba(44,38,32,0.12)" stroke-width="1"/>
  <text x="640" y="342" text-anchor="middle" class="lb" font-size="14" letter-spacing="1.5" fill="#6A6052">4M+ users &#183; 2.6M sign-ups &#183; mobile web</text>
</svg>
